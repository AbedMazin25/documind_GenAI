apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: documind-ingress
  namespace: documind
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: app.documind.ai
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: documind-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: documind-frontend
                port:
                  number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: documind-backend
  namespace: documind
spec:
  replicas: 2
  selector:
    matchLabels:
      app: documind-backend
  template:
    metadata:
      labels:
        app: documind-backend
    spec:
      containers:
        - name: backend
          image: documindacr.azurecr.io/backend:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
