apiVersion: apps/v1
kind: Deployment
metadata:
  name: documind-backend
  namespace: documind
spec:
  replicas: 2
  selector:
    matchLabels:
      app: documind-backend
  template:
    metadata:
      labels:
        app: documind-backend
    spec:
      containers:
        - name: backend
          image: documindacr.azurecr.io/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: documind-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: documind-backend
  namespace: documind
spec:
  selector:
    app: documind-backend
  ports:
    - port: 8000
      targetPort: 8000
