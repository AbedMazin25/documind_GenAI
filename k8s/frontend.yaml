apiVersion: apps/v1
kind: Deployment
metadata:
  name: documind-frontend
  namespace: documind
spec:
  replicas: 2
  selector:
    matchLabels:
      app: documind-frontend
  template:
    metadata:
      labels:
        app: documind-frontend
    spec:
      containers:
        - name: frontend
          image: documindacr.azurecr.io/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: documind-frontend
  namespace: documind
spec:
  selector:
    app: documind-frontend
  ports:
    - port: 80
      targetPort: 80
