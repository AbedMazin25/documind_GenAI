groups:
  - name: documind
    rules:
      - alert: HighErrorRate
        expr: rate(documind_requests_total{status_code=~"5.."}[5m]) / rate(documind_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error rate above 5% for 5 minutes"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(documind_request_latency_seconds_bucket[5m])) > 2.0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency above 2s"

      - alert: WorkerQueueBacklog
        expr: documind_celery_queue_length > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Celery queue backlog above 100 tasks"
